name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0   # needed so build-app.sh can derive the version from tags

      - name: Resolve version
        id: ver
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: make app

      - name: Zip the app
        run: |
          cd build
          ditto -c -k --keepParent "MCP Manager.app" "MCP-Manager-${{ steps.ver.outputs.tag }}.app.zip"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > "$RUNNER_TEMP/notes.md" <<'NOTES'
          **Universal build** — runs natively on Apple Silicon and Intel Macs.

          **Install:** download the `.app.zip`, unzip, and move `MCP Manager.app` to `/Applications`.

          The app is ad-hoc signed (not notarized by Apple), so on first launch macOS may say it's "damaged" or from an unidentified developer. Right-click the app and choose **Open**, or clear the quarantine flag:

          ```
          xattr -dr com.apple.quarantine "/Applications/MCP Manager.app"
          ```
          NOTES
          gh release create "${{ steps.ver.outputs.tag }}" \
            "build/MCP-Manager-${{ steps.ver.outputs.tag }}.app.zip" \
            --title "MCP Manager ${{ steps.ver.outputs.tag }}" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            --generate-notes
